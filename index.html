<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>张老师课表</title>
<style>
:root {
  --bg: #F2F3F7;
  --card: #FFFFFF;
  --primary: #388E3C;
  --primary-dark: #2E7D32;
  --text: #1A1D2E;
  --text2: #6B7094;
  --text3: #A0A4C0;
  --shadow: 0 2px 12px rgba(56,142,60,.08);
  --shadow-lg: 0 8px 32px rgba(56,142,60,.12);
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); max-width: 560px; margin: 0 auto; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
.hidden { display: none !important; }

/* 顶部 */
header { background: rgba(255,255,255,.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid rgba(0,0,0,.04); }
header h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }

/* 同步状态灯 */
.sync-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.sync-dot.ok { background: #4CAF50; }
.sync-dot.err { background: #FF4757; }
.sync-dot.off { background: #ccc; }

/* 标签 */
.tabs { display: flex; margin: 12px 12px 0; background: rgba(0,0,0,.04); border-radius: 12px; padding: 3px; gap: 3px; }
.tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; cursor: pointer; border-radius: 10px; font-weight: 500; color: var(--text2); transition: .25s; }
.tab.active { background: #fff; color: var(--primary); font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,.06); }

/* 视图切换 */
.view-toggle { display: flex; margin: 8px 12px 0; background: rgba(0,0,0,.04); border-radius: 10px; padding: 2px; gap: 2px; }
.view-toggle .vt { flex: 1; text-align: center; padding: 7px; font-size: 12px; cursor: pointer; border-radius: 8px; font-weight: 500; color: var(--text2); transition: .2s; }
.view-toggle .vt.active { background: #fff; color: var(--primary); font-weight: 600; box-shadow: 0 1px 6px rgba(0,0,0,.06); }

/* 周导航 */
.week-nav { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 12px 2px; }
.week-nav button { width: 36px; height: 36px; border: none; background: var(--card); border-radius: 50%; font-size: 18px; cursor: pointer; color: var(--text); box-shadow: var(--shadow); transition: .2s; display: flex; align-items: center; justify-content: center; }
.week-nav button:active { background: #f0f0f5; transform: scale(.94); }
.week-nav .week-label { font-size: 15px; font-weight: 700; min-width: 200px; text-align: center; letter-spacing: -.2px; }

/* 天选择器 */
.day-strip { display: flex; gap: 8px; padding: 10px 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.day-strip::-webkit-scrollbar { display: none; }
.day-chip { flex-shrink: 0; width: 62px; padding: 10px 0; border-radius: 14px; text-align: center; cursor: pointer; background: var(--card); box-shadow: var(--shadow); transition: .25s; position: relative; }
.day-chip.active { background: var(--primary); color: #fff; box-shadow: 0 4px 16px rgba(56,142,60,.35); transform: translateY(-2px); }
.day-chip .chip-day { font-size: 12px; margin-bottom: 2px; opacity: .7; }
.day-chip.active .chip-day { opacity: .9; }
.day-chip .chip-date { font-size: 18px; font-weight: 700; }
.day-chip .chip-dot { display: none; width: 6px; height: 6px; border-radius: 50%; background: var(--primary); margin: 6px auto 0; }
.day-chip.active .chip-dot { background: #fff; }
.day-chip.has-class .chip-dot { display: block; }
.day-chip .chip-today { font-size: 10px; color: var(--primary); font-weight: 600; margin-top: 1px; }
.day-chip.active .chip-today { color: rgba(255,255,255,.8); }

/* 课程卡片 */
.class-list { padding: 8px 12px 80px; }
.class-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; display: flex; gap: 14px; align-items: center; box-shadow: var(--shadow); cursor: pointer; transition: .2s; border-left: 4px solid var(--primary); position: relative; overflow: hidden; }
.class-card:active { transform: scale(.98); box-shadow: var(--shadow-lg); }
.class-card .card-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
.class-card .card-time { font-size: 17px; font-weight: 700; white-space: nowrap; min-width: 100px; letter-spacing: -.2px; }
.class-card .card-info { flex: 1; min-width: 0; }
.class-card .card-names { font-size: 15px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.class-card .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
.tag-grade { background: #EEF0FF; color: var(--primary); }

/* 周视图 */
.week-day-header { font-size: 14px; font-weight: 700; color: var(--primary); padding: 8px 14px 6px; margin-top: 6px; display: flex; align-items: center; gap: 8px; }
.week-day-header .wd-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
.week-day-header .wd-date { font-size: 12px; color: var(--text2); font-weight: 400; margin-left: auto; }
.week-empty-day { padding: 4px 14px 2px; font-size: 12px; color: var(--text3); }

/* 空状态 */
.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty .icon { font-size: 64px; margin-bottom: 16px; opacity: .6; }
.empty p { font-size: 15px; margin-bottom: 6px; }

/* 按钮 */
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 24px; border-radius: 12px; font-size: 14px; border: none; cursor: pointer; font-weight: 600; transition: .2s; letter-spacing: -.1px; }
.btn-primary { background: var(--primary); color: #fff; box-shadow: 0 4px 14px rgba(56,142,60,.3); }
.btn-primary:active { background: var(--primary-dark); transform: scale(.97); }
.btn-outline { background: var(--card); color: var(--primary); border: 1.5px solid #E0E2F0; }
.btn-danger { background: #FF4757; color: #fff; }
.btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 8px; }
.btn-block { width: 100%; }
.fab { position: fixed; bottom: 28px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #388E3C, #66BB6A); color: #fff; font-size: 28px; border: none; box-shadow: 0 6px 20px rgba(56,142,60,.4); cursor: pointer; z-index: 5; transition: .25s; display: flex; align-items: center; justify-content: center; }
.fab:active { transform: scale(.9); box-shadow: 0 3px 10px rgba(56,142,60,.3); }

/* 弹窗 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: rgba(255,255,255,.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); width: 100%; max-width: 560px; border-radius: 24px 24px 0 0; padding: 24px 20px 36px; max-height: 85vh; overflow-y: auto; animation: slideUp .3s cubic-bezier(.16,1,.3,1); box-shadow: 0 -8px 40px rgba(0,0,0,.08); }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; letter-spacing: -.3px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 1.5px solid #E8E9F0; border-radius: 12px; font-size: 15px; background: #F8F9FC; color: var(--text); transition: .2s; -webkit-appearance: none; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(56,142,60,.1); }
.form-actions { display: flex; gap: 10px; margin-top: 24px; }
.form-actions button { flex: 1; }
.token-hint { font-size: 12px; color: var(--text3); margin-top: 6px; }
.token-hint a { color: var(--primary); }

/* 学生列表 */
.student-list { padding: 12px; }
.student-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); cursor: pointer; transition: .2s; }
.student-card:active { transform: scale(.98); }
.student-card .meta { font-size: 13px; color: var(--text2); margin-top: 3px; }

/* 分享视图 */
.share-header { background: linear-gradient(135deg, #388E3C, #66BB6A); color: #fff; padding: 36px 20px; text-align: center; border-radius: 0 0 24px 24px; }
.share-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.share-header p { font-size: 13px; opacity: .8; }
.share-class-card { border-left-width: 4px; }

/* Toast */
.toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: rgba(26,29,46,.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: #fff; padding: 12px 22px; border-radius: 24px; font-size: 13px; z-index: 200; animation: fadeIn .3s; pointer-events: none; font-weight: 500; }
@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

.action-bar { padding: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.action-bar button { flex: 1; min-width: 80px; }

/* 学生选择芯片 */
.student-select { padding: 4px 0; }
.student-chip { display: inline-block; padding: 9px 16px; margin: 3px; border: 1.5px solid #E8E9F0; border-radius: 22px; font-size: 13px; cursor: pointer; background: #F8F9FC; transition: .2s; font-weight: 500; }
.student-chip.selected { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 12px rgba(56,142,60,.25); }

.day-strip-header { font-size: 12px; color: var(--text3); padding: 0 14px 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
</style>
</head>
<body>

<!-- 管理端 -->
<div id="adminView">
  <header>
    <h1>&#x1F4C5; 张老师课表</h1>
    <div style="display:flex;gap:6px;align-items:center">
      <span class="sync-dot off" id="syncDot" title="同步状态"></span>
      <button class="btn btn-outline btn-sm" onclick="showExportModal()">备份</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('schedule')">课表</div>
    <div class="tab" onclick="switchTab('students')">学生</div>
  </div>

  <!-- 课表视图 -->
  <div id="scheduleView">
    <div class="week-nav">
      <button onclick="prevWeek()">&#x2039;</button>
      <span class="week-label" id="weekLabel"></span>
      <button onclick="nextWeek()">&#x203A;</button>
      <button class="btn btn-outline btn-sm" onclick="goToday()">今天</button>
    </div>

    <div class="view-toggle" id="viewToggle">
      <div class="vt active" onclick="setViewMode('day')">日视图</div>
      <div class="vt" onclick="setViewMode('week')">周视图</div>
    </div>

    <div class="day-strip" id="dayTabs"></div>

    <div class="class-list" id="classList"></div>

    <div id="shareBar" class="action-bar hidden">
      <button class="btn btn-primary" style="flex:2" onclick="generateShareLink()">&#x1F4E4; 分享链接</button>
      <button class="btn btn-outline" style="flex:1" onclick="screenshotWeek()">&#x1F4F8; 截图</button>
    </div>
  </div>

  <!-- 学生管理视图 -->
  <div id="studentView" class="hidden">
    <div class="action-bar">
      <button class="btn btn-primary btn-block" onclick="showStudentModal()">+ 添加学生</button>
    </div>
    <div class="student-list" id="studentList"></div>
    <div class="empty" id="studentEmpty">
      <div class="icon">&#x1F4CB;</div>
      <div>还没有添加学生</div>
    </div>
  </div>

  <button class="fab hidden" id="fabAdd" onclick="showClassModal()">+</button>
</div>

<!-- 分享视图 -->
<div id="shareView" class="hidden">
  <div class="share-header">
    <h2>&#x1F4C5; 课程安排</h2>
    <p id="shareWeekLabel"></p>
  </div>
  <div class="class-list" id="shareClassList"></div>
  <div class="empty" id="shareEmpty">
    <div class="icon">&#x1F4ED;</div>
    <div>本周暂无课程</div>
  </div>
</div>

<!-- 弹窗：添加/编辑课程 -->
<div class="modal-overlay hidden" id="classModal">
  <div class="modal">
    <h3 id="classModalTitle">添加课程</h3>
    <div class="form-group">
      <label>学生（可多选）</label>
      <div class="student-select" id="studentChips"></div>
    </div>
    <div class="form-group">
      <label>上课日期（可多选）</label>
      <div class="student-select" id="dayChips"></div>
    </div>
    <div class="form-group" style="display:flex;gap:10px">
      <div style="flex:1"><label>开始时间</label><input type="time" id="classStart"></div>
      <div style="flex:1"><label>结束时间</label><input type="time" id="classEnd"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal('classModal')">取消</button>
      <button class="btn btn-danger btn-sm hidden" id="classDeleteBtn" onclick="deleteClass()">删除</button>
      <button class="btn btn-primary" id="classSaveBtn" onclick="saveClass()">保存</button>
    </div>
  </div>
</div>

<!-- 弹窗：学生 -->
<div class="modal-overlay hidden" id="studentModal">
  <div class="modal">
    <h3 id="studentModalTitle">添加学生</h3>
    <div class="form-group">
      <label>学生代号 *</label>
      <input type="text" id="stuCode" placeholder="如：张同学 / A01 / 小明">
    </div>
    <div class="form-group">
      <label>年级</label>
      <select id="stuGrade">
        <option value="">不填</option>
        <option>初一</option><option>初二</option><option>初三</option>
        <option>高一</option><option>高二</option><option>高三</option>
        <option>小学</option><option>其他</option>
      </select>
    </div>
    <div class="form-group">
      <label>科目</label>
      <select id="stuSubject">
        <option value="">不填</option>
        <option>英语</option><option>数学</option><option>语文</option>
        <option>物理</option><option>化学</option><option>其他</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal('studentModal')">取消</button>
      <button class="btn btn-danger btn-sm hidden" id="stuDeleteBtn" onclick="deleteStudent()">删除</button>
      <button class="btn btn-primary" id="stuSaveBtn" onclick="saveStudent()">保存</button>
    </div>
  </div>
</div>

<!-- 弹窗：备份/同步设置 -->
<div class="modal-overlay hidden" id="exportModal">
  <div class="modal">
    <h3>备份 & 同步</h3>

    <div class="form-group">
      <label>同步状态：<span id="syncStatus">检查中...</span></label>
    </div>

    <div class="form-group">
      <label>GitHub Token（配好后自动云端同步）</label>
      <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
      <div class="token-hint">
        <a href="https://github.com/settings/tokens" target="_blank">创建 token</a> → 勾选 repo → 生成后粘贴到这里
      </div>
    </div>
    <div class="form-actions" style="flex-direction:column">
      <button class="btn btn-primary btn-block" id="syncSaveBtn" onclick="saveSyncConfig()">&#x2601;&#xFE0F; 保存并同步</button>
      <button class="btn btn-outline btn-block" onclick="manualSync()">&#x1F504; 手动同步</button>
    </div>
    <hr style="margin:20px 0;border:none;border-top:1px solid #E8E9F0">
    <div class="form-actions" style="flex-direction:column">
      <button class="btn btn-primary btn-block" onclick="exportData()">&#x1F4E5; 导出数据文件</button>
      <button class="btn btn-outline btn-block" onclick="document.getElementById('importFile').click()">&#x1F4E4; 导入数据文件</button>
      <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(event)">
      <button class="btn btn-outline btn-block" onclick="closeModal('exportModal')">关闭</button>
    </div>
    <p style="font-size:12px;color:#999;margin-top:12px;text-align:center">导入会覆盖当前全部数据，请先备份</p>
  </div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
// ========== 数据层 ==========
const DB = {
  getStudents() { try { return JSON.parse(localStorage.schedule_students || '[]'); } catch(e) { return []; } },
  setStudents(v) { try { localStorage.schedule_students = JSON.stringify(v); } catch(e) { console.error(e); alert('保存失败：浏览器存储不可用'); } },
  getClasses() { try { return JSON.parse(localStorage.schedule_classes || '[]'); } catch(e) { return []; } },
  setClasses(v) { try { localStorage.schedule_classes = JSON.stringify(v); } catch(e) { console.error(e); alert('保存失败：浏览器存储不可用'); } },
  ok() { try { localStorage._test=1; delete localStorage._test; return true; } catch(e) { return false; } }
};

// ========== 云端同步 ==========
const SYNC = {
  REPO: 'Haom99/schedule',
  FILE: 'data.json',
  BRANCH: 'main',

  getToken() { return localStorage.sync_token || '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'; },
  setToken(t) { localStorage.sync_token = t; },
  hasToken() { return !!this.getToken(); },

  // 读远程数据（无需 token，公开仓库可直读）
  async pull() {
    const url = `https://raw.githubusercontent.com/${this.REPO}/${this.BRANCH}/${this.FILE}`;
    const resp = await fetch(url, { cache: 'no-store' });
    if (!resp.ok) throw new Error('远程数据不存在或网络错误');
    return await resp.json();
  },

  // 写远程数据
  async push(data) {
    const token = this.getToken();
    if (!token) throw new Error('未配置 Token');

    // 先获取当前文件 SHA
    const apiUrl = `https://api.github.com/repos/${this.REPO}/contents/${this.FILE}`;
    let sha = '';
    try {
      const r = await fetch(apiUrl, { headers: { Authorization: 'Bearer ' + token } });
      if (r.ok) { const j = await r.json(); sha = j.sha; }
    } catch(e) {}

    const content = btoa(String.fromCharCode(...new TextEncoder().encode(JSON.stringify(data))));
    const body = JSON.stringify({
      message: 'sync: ' + new Date().toLocaleString('zh-CN'),
      content: content,
      branch: this.BRANCH
    });
    if (sha) body.sha = sha; // 更新已有文件需要 sha

    const resp = await fetch(apiUrl, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
      },
      body: sha ? JSON.stringify({ message: 'sync: ' + new Date().toLocaleString('zh-CN'), content, sha, branch: this.BRANCH }) :
                  JSON.stringify({ message: 'sync: ' + new Date().toLocaleString('zh-CN'), content, branch: this.BRANCH })
    });

    if (!resp.ok) {
      const e = await resp.json().catch(() => ({}));
      throw new Error(e.message || '推送失败');
    }
    return true;
  },

  // 双向合并：远程数据优先，本地新增的保留
  merge(localData, remoteData) {
    const merged = {
      students: [...(remoteData.students || [])],
      classes: [...(remoteData.classes || [])]
    };

    // 把本地有但远程没有的数据补进去
    const remoteStudentIds = new Set(merged.students.map(s => s.id));
    const remoteClassIds = new Set(merged.classes.map(c => c.id));

    (localData.students || []).forEach(s => {
      if (!remoteStudentIds.has(s.id)) merged.students.push(s);
    });
    (localData.classes || []).forEach(c => {
      if (!remoteClassIds.has(c.id)) merged.classes.push(c);
    });

    return merged;
  },

  // 完整拉取合并流程
  async syncFromCloud() {
    if (!this.hasToken()) {
      this.updateDot('off');
      return false;
    }
    try {
      const remote = await this.pull();
      if (!remote || !remote._version) throw new Error('数据格式不对');

      const local = { students: DB.getStudents(), classes: DB.getClasses() };
      const localVer = parseInt(localStorage.sync_version || '0');
      const remoteVer = parseInt(remote._version || '0');

      if (remoteVer > localVer) {
        // 远程更新，合并写入本地
        const merged = this.merge(local, remote);
        DB.setStudents(merged.students);
        DB.setClasses(merged.classes);
        localStorage.sync_version = remoteVer;
        this.updateDot('ok');
        return true;
      } else if (remoteVer < localVer) {
        // 本地更新，推上去
        await this.pushToCloud();
        this.updateDot('ok');
        return true;
      } else {
        this.updateDot('ok');
        return false; // 版本一致
      }
    } catch(e) {
      console.error('同步失败:', e);
      this.updateDot('err');
      return false;
    }
  },

  // 推送本地到云端
  async pushToCloud() {
    if (!this.hasToken()) {
      this.updateDot('off');
      return false;
    }
    try {
      const data = {
        students: DB.getStudents(),
        classes: DB.getClasses(),
        _version: Date.now(),
        _updated: new Date().toISOString()
      };
      await this.push(data);
      localStorage.sync_version = data._version;
      this.updateDot('ok');
      return true;
    } catch(e) {
      console.error('推送失败:', e);
      this.updateDot('err');
      return false;
    }
  },

  updateDot(state) {
    const dot = document.getElementById('syncDot');
    if (dot) {
      dot.className = 'sync-dot ' + state;
      dot.title = { ok: '已同步', err: '同步失败', off: '未配置同步' }[state] || '';
    }
    const st = document.getElementById('syncStatus');
    if (st) st.textContent = { ok: '✅ 已同步', err: '❌ 同步失败', off: '⚙️ 未配置' }[state] || '';
  }
};

// ========== 全局变量 ==========
let currentWeekStart = getMonday(new Date());
let selectedDayIdx = 0;
let viewMode = 'day';
let editingClassId = null;
let editingStudentId = null;
let selectedStudentIds = [];
let selectedDayIdxs = [];

function getMonday(d) { const r = new Date(d); r.setHours(0,0,0,0); const day = r.getDay(); const diff = day === 0 ? -6 : 1 - day; r.setDate(r.getDate() + diff); return r; }
function fmtDate(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function fmtLocalDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function weekDayName(i) { return ['一','二','三','四','五','六','日'][i]; }
function getDayDate(i) { const d = new Date(currentWeekStart); d.setDate(d.getDate() + i); return d; }

// ========== 初始化 ==========
async function init() {
  const hash = window.location.hash.slice(1);
  if (hash) {
    showShareView(hash);
  } else {
    showAdminView();
    // 异步拉云端数据
    if (SYNC.hasToken()) {
      const updated = await SYNC.syncFromCloud();
      if (updated) {
        renderAll();
        toast('✅ 已同步最新数据');
      }
    }
  }
}

function showAdminView() {
  document.getElementById('adminView').classList.remove('hidden');
  document.getElementById('shareView').classList.add('hidden');
  switchTab('schedule');
  renderAll();
}

// ========== 标签切换 ==========
function switchTab(tab) {
  document.querySelectorAll('.tabs .tab').forEach((t,i) => {
    t.classList.toggle('active', (tab === 'schedule' && i === 0) || (tab === 'students' && i === 1));
  });
  document.getElementById('scheduleView').classList.toggle('hidden', tab !== 'schedule');
  document.getElementById('studentView').classList.toggle('hidden', tab !== 'students');

function setViewMode(mode) {

// ========== 周导航 ==========
function prevWeek() { currentWeekStart.setDate(currentWeekStart.getDate() - 7); renderCalendar(); }
function nextWeek() { currentWeekStart.setDate(currentWeekStart.getDate() + 7); renderCalendar(); }
function goToday() { currentWeekStart = getMonday(new Date()); renderCalendar(); }

// ========== 渲染课表 ==========
function renderCalendar() {
  const endDate = new Date(currentWeekStart);
  endDate.setDate(endDate.getDate() + 6);
  document.getElementById('weekLabel').textContent =
    `${currentWeekStart.getFullYear()}年 ${fmtDate(currentWeekStart)} - ${fmtDate(endDate)}`;

  const today = new Date(); today.setHours(0,0,0,0);
  const weekStr = fmtLocalDate(currentWeekStart);
  const allWeekClasses = DB.getClasses().filter(c => c.weekStart === weekStr);
  const daysWithClass = new Set();
  allWeekClasses.forEach(c => {
    (c.dayIdxs || (c.dayIdx !== undefined ? [c.dayIdx] : [])).forEach(d => daysWithClass.add(d));
  });

  // 天标签条
  let dayTabsHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = getDayDate(i);
    const isToday = d.getTime() === today.getTime();
    dayTabsHTML += `<div class="day-chip${i === selectedDayIdx ? ' active' : ''}${daysWithClass.has(i) ? ' has-class' : ''}" onclick="selectDay(${i})">
      <div class="chip-day">周${weekDayName(i)}</div><div class="chip-date">${d.getDate()}</div>
      ${isToday ? '<div class="chip-today">今天</div>' : ''}<div class="chip-dot"></div>
    </div>`;
  }
  document.getElementById('dayTabs').innerHTML = dayTabsHTML;

  const students = DB.getStudents();

  if (viewMode === 'week') {
    let html = '', total = 0;
    for (let i = 0; i < 7; i++) {
      const dayClasses = allWeekClasses.filter(c => {
        return (c.dayIdxs || (c.dayIdx !== undefined ? [c.dayIdx] : [])).includes(i);
      }).sort((a,b) => a.startTime.localeCompare(b.startTime));
      const d = getDayDate(i);
      html += `<div class="week-day-header"><span class="wd-dot"></span>周${weekDayName(i)} · ${fmtDate(d)}${d.getTime()===today.getTime()?' 今天':''}<span class="wd-date">${dayClasses.length}节</span></div>`;
      if (dayClasses.length === 0) { html += '<div class="week-empty-day">这天没课</div>'; }
      else { dayClasses.forEach(c => { const stus = (c.studentIds||[]).map(id=>students.find(s=>s.id===id)).filter(Boolean); html += `<div class="class-card" onclick="editClass('${c.id}')"><div class="card-time">${c.startTime.slice(0,5)}<br>${c.endTime.slice(0,5)}</div><div class="card-info"><div class="card-names">${stus.map(s=>s.codeName).join('、')||'未指定'}</div><div class="card-tags">${[...new Set(stus.map(s=>s.grade).filter(Boolean))].map(g=>'<span class="tag tag-grade">'+g+'</span>').join('')}</div></div></div>`; }); total+=dayClasses.length; }
    }
    if (total===0) html += '<div class="empty"><div class="icon">📭</div><div>本周还没排课</div></div>';
    document.getElementById('classList').innerHTML = html;
  } else {
    const dayClasses = allWeekClasses.filter(c => (c.dayIdxs||(c.dayIdx!==undefined?[c.dayIdx]:[])).includes(selectedDayIdx)).sort((a,b)=>a.startTime.localeCompare(b.startTime));
    let html = '';
    if (dayClasses.length===0) { html='<div class="empty"><div class="icon">📭</div><div>这天没课</div></div>'; }
    else { dayClasses.forEach(c=>{ const stus=(c.studentIds||[]).map(id=>students.find(s=>s.id===id)).filter(Boolean); html+=`<div class="class-card" onclick="editClass('${c.id}')"><div class="card-time">${c.startTime.slice(0,5)}<br>${c.endTime.slice(0,5)}</div><div class="card-info"><div class="card-names">${stus.map(s=>s.codeName).join('、')||'未指定'}</div><div class="card-tags">${[...new Set(stus.map(s=>s.grade).filter(Boolean))].map(g=>'<span class="tag tag-grade">'+g+'</span>').join('')}</div></div></div>`; }); }
    document.getElementById('classList').innerHTML = html;
  }

  document.getElementById('shareBar').classList.toggle('hidden', allWeekClasses.length === 0);
}

function selectDay(i) { selectedDayIdx = i; renderCalendar(); }

// ========== 课程弹窗 ==========
function renderDayChips() {
  let html = '';

    const d = getDayDate(i);

  }

}

function toggleDayChip(i,el) {

function showClassModal() {

function editClass(id) {
  const c=DB.getClasses().find(x=>x.id===id); if(!c) return;
  editingClassId=id; selectedStudentIds=[...(c.studentIds||[])]; selectedDayIdxs=c.dayIdxs?[...c.dayIdxs]:(c.dayIdx!==undefined?[c.dayIdx]:[selectedDayIdx]);

  document.getElementById('classDeleteBtn').classList.remove('hidden');
  renderDayChips(); document.getElementById('classStart').value=c.startTime; document.getElementById('classEnd').value=c.endTime;

}

function closeModal(id) { document.getElementById(id).classList.add('hidden'); editingClassId=null; editingStudentId=null; selectedStudentIds=[]; selectedDayIdxs=[]; }

async function saveClass() {
  const startTime=document.getElementById('classStart').value;
  const endTime=document.getElementById('classEnd').value;
  if (!startTime||!endTime) { toast('请选择时间'); return; }
  if (startTime>=endTime) { toast('结束时间必须晚于开始时间'); return; }
  if (selectedStudentIds.length===0) { toast('请至少选择一个学生'); return; }
  if (selectedDayIdxs.length===0) { toast('请至少选择一个日期'); return; }

  const classes=DB.getClasses();
  if (editingClassId) {
    const idx=classes.findIndex(c=>c.id===editingClassId);
    if (idx>=0) { classes[idx].dayIdxs=[...selectedDayIdxs].sort(); classes[idx].startTime=startTime; classes[idx].endTime=endTime; classes[idx].studentIds=[...selectedStudentIds]; classes[idx].weekStart=fmtLocalDate(currentWeekStart); }
  } else {
    classes.push({ id:'c_'+Date.now(), dayIdxs:[...selectedDayIdxs].sort(), startTime,endTime, studentIds:[...selectedStudentIds], weekStart:fmtLocalDate(currentWeekStart) });
  }
  DB.setClasses(classes);
  closeModal('classModal');
  renderCalendar();

  // 自动推送到云端
  if (SYNC.hasToken()) {
    const ok = await SYNC.pushToCloud();
    if (ok) toast('✅ 已保存并同步'); else toast('✅ 已保存（同步失败）');
  } else {
    toast('✅ 已保存！本周共'+DB.getClasses().filter(c=>c.weekStart===fmtLocalDate(currentWeekStart)).length+'节课');
  }
}

async function deleteClass() {
  if (!editingClassId) return;
  if (!confirm('确定删除这个课程？')) return;
  DB.setClasses(DB.getClasses().filter(c=>c.id!==editingClassId));
  closeModal('classModal');
  renderCalendar();
  if (SYNC.hasToken()) await SYNC.pushToCloud();
}

function renderStudentChips() {
  const students=DB.getStudents();
  if (students.length===0) { document.getElementById('studentChips').innerHTML='<span style="color:#999;font-size:13px">还没有添加学生，请先去"学生"页添加</span>'; return; }
  document.getElementById('studentChips').innerHTML=students.map(s=>{
    return `<span class="student-chip${selectedStudentIds.includes(s.id)?' selected':''}" onclick="toggleStudentChip('${s.id}',this)">${s.codeName}</span>`;

}

function toggleStudentChip(id,el) {
  if (selectedStudentIds.includes(id)) { selectedStudentIds=selectedStudentIds.filter(x=>x!==id); el.classList.remove('selected'); }

// ========== 分享（紧凑编码） ==========
function generateShareLink() {
  const students=DB.getStudents();
  const weekClasses=DB.getClasses().filter(c=>c.weekStart===fmtLocalDate(currentWeekStart));
  if (weekClasses.length===0) { toast('本周没有课程可分享'); return; }
  const lines=[fmtLocalDate(currentWeekStart)];
  weekClasses.forEach(c=>{
    const stus=(c.studentIds||[]).map(id=>students.find(s=>s.id===id)).filter(Boolean);
    const days=(c.dayIdxs||(c.dayIdx!==undefined?[c.dayIdx]:[])).sort().join('.');
    const names=stus.map(s=>s.codeName).join('、');
    const grades=[...new Set(stus.map(s=>s.grade).filter(Boolean))].join('.');
    lines.push([days,c.startTime.slice(0,5),c.endTime.slice(0,5),names,grades].join(';'));
  });
  const raw=lines.join('|');
  const encoded=btoa(String.fromCharCode(...new TextEncoder().encode(raw)));
  const link=location.origin+location.pathname+'#'+encoded;
  if (navigator.clipboard) { navigator.clipboard.writeText(link).then(()=>toast('✅ 分享链接已复制！')); }
  else { const ta=document.createElement('textarea'); ta.value=link; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); toast('✅ 分享链接已复制！'); }
}

// ========== 分享视图 ==========
function showShareView(hash) {
  document.getElementById('adminView').classList.add('hidden');
  document.getElementById('shareView').classList.remove('hidden');
  try {
    const decoded=new TextDecoder().decode(Uint8Array.from(atob(hash).split('').map(c=>c.charCodeAt(0))));
    let weekStart,classes=[];
    if (decoded.startsWith('{')) {
      const data=JSON.parse(decoded);
      weekStart=new Date(data.w+'T00:00:00');
      data.c.forEach(raw=>{ const c=Array.isArray(raw)?{d:raw[0],s:raw[1],e:raw[2],n:raw[3],g:raw[4]||[],b:raw[5]||[]}:raw; (Array.isArray(c.d)?c.d:[c.d]).forEach(day=>{classes.push({s:c.s,e:c.e,n:c.n,g:c.g||[],b:c.b||[],day});});});
    } else {
      const parts=decoded.split('|');
      weekStart=new Date(parts[0]+'T00:00:00');
      for (let i=1;i<parts.length;i++) { const seg=parts[i].split(';'); seg[0].split('.').map(Number).forEach(day=>{classes.push({s:seg[1],e:seg[2],n:seg[3]?seg[3].split('、'):[],g:seg[4]?seg[4].split('.'):[],day});}); }
    }
    const weekEnd=new Date(weekStart); weekEnd.setDate(weekEnd.getDate()+6);
    document.getElementById('shareWeekLabel').textContent=weekStart.getFullYear()+'年 '+fmtDate(weekStart)+' - '+fmtDate(weekEnd);
    const byDay={};
    classes.forEach(c=>{if(!byDay[c.day])byDay[c.day]=[];byDay[c.day].push(c);});
    let html='';
    for(let i=0;i<7;i++){const dc=(byDay[i]||[]).sort((a,b)=>a.s.localeCompare(b.s)); if(dc.length===0)continue; html+='<div class="day-section"><div class="day-title">周'+weekDayName(i)+' · '+fmtDate(new Date(weekStart.getTime()+i*86400000))+'</div>'; dc.forEach(c=>{html+='<div class="class-card share-class-card"><div class="info"><div class="time">'+c.s+' - '+c.e+'</div><div class="detail">'+c.n.join('、')+'</div></div><div style="text-align:right">'+(c.g||[]).map(function(g){return'<span class="tag tag-grade">'+g+'</span>';}).join('')+(c.b||[]).map(function(b){return'<span class="tag tag-subject">'+b+'</span>';}).join('')+'</div></div>';}); html+='</div>';}
    document.getElementById('shareClassList').innerHTML=html;
    document.getElementById('shareEmpty').classList.toggle('hidden',html!=='');
  }catch(e){ document.getElementById('shareClassList').innerHTML='<div class="empty"><div class="icon">⚠️</div><div>链接已失效，请联系重新分享</div></div>'; document.getElementById('shareEmpty').classList.add('hidden'); }
}

// ========== 同步设置 ==========
function showExportModal() {
  document.getElementById('ghToken').value = SYNC.getToken();
  document.getElementById('exportModal').classList.remove('hidden');
}

function saveSyncConfig() {
  const token = document.getElementById('ghToken').value.trim();
  if (!token) {
    SYNC.setToken('');
    localStorage.removeItem('sync_version');
    SYNC.updateDot('off');
    document.getElementById('syncStatus').textContent = '⚙️ 未配置';
    toast('已清除同步配置');
    return;

  if (!token.startsWith('ghp_') && !token.startsWith('github_pat_')) {
    toast('⚠️ Token 格式不对，应该以 ghp_ 或 github_pat_ 开头');
    return;
  }
  SYNC.setToken(token);
  toast('✅ Token 已保存，正在同步...');
  closeModal('exportModal');
  // 立即首次同步
  SYNC.pushToCloud().then(ok => {
    if (ok) toast('✅ 云端同步成功！');

  });
}

async function manualSync() {

  toast('🔄 同步中...');
  const updated = await SYNC.syncFromCloud();
  if (updated) { renderAll(); toast('✅ 同步完成'); }
  else { toast('✅ 数据已是最新'); }
}

// ========== 备份 ==========
function exportData() {
  const blob=new Blob([JSON.stringify({ students:DB.getStudents(), classes:DB.getClasses() },null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='schedule_backup_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  toast('✅ 备份文件已下载');
}

function importData(e) {
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){ try{ const data=JSON.parse(ev.target.result); if(data.students)DB.setStudents(data.students); if(data.classes)DB.setClasses(data.classes); toast('✅ 数据导入成功'); renderAll(); closeModal('exportModal'); }catch(ex){toast('❌ 文件格式错误');} };
  reader.readAsText(file); e.target.value='';
}

function toast(msg) { const el=document.createElement('div'); el.className='toast'; el.textContent=msg; document.body.appendChild(el); setTimeout(()=>el.remove(),2000); }
