<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>张老师课表</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; max-width: 600px; margin: 0 auto; min-height: 100vh; }
.hidden { display: none !important; }

/* 顶部导航 */
header { background: #fff; padding: 12px 16px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
header h1 { font-size: 18px; }

/* 标签切换 */
.tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; }
.tab { flex: 1; text-align: center; padding: 12px; font-size: 14px; cursor: pointer; color: #999; border-bottom: 2px solid transparent; transition: .2s; }
.tab.active { color: #4A90D9; border-bottom-color: #4A90D9; font-weight: 600; }

/* 周选择器 */
.week-nav { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 12px; background: #fff; margin-top: 8px; border-radius: 8px; }
.week-nav button { border: 1px solid #ddd; background: #fff; padding: 6px 12px; border-radius: 6px; font-size: 16px; cursor: pointer; }
.week-nav .week-label { font-size: 14px; font-weight: 600; min-width: 180px; text-align: center; }

/* 天选择器 */
.day-tabs { display: flex; gap: 4px; padding: 8px 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab { flex-shrink: 0; padding: 8px 14px; border-radius: 20px; border: 1px solid #eee; background: #fff; font-size: 13px; cursor: pointer; white-space: nowrap; transition: .2s; }
.day-tab.active { background: #4A90D9; color: #fff; border-color: #4A90D9; }
.day-tab .date-num { font-size: 11px; opacity: .7; }

/* 课程卡片 */
.class-list { padding: 12px; }
.day-section { margin-bottom: 16px; }
.day-title { font-size: 14px; color: #999; margin-bottom: 8px; padding-left: 4px; }
.class-card { background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 8px; border-left: 4px solid #4A90D9; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 3px rgba(0,0,0,.05); cursor: pointer; transition: .15s; }
.class-card:active { transform: scale(.98); }
.class-card .info { flex: 1; }
.class-card .time { font-size: 15px; font-weight: 600; }
.class-card .detail { font-size: 13px; color: #666; margin-top: 2px; }
.class-card .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }
.tag-grade { background: #e8f0fe; color: #4A90D9; }
.tag-subject { background: #fef3e2; color: #e6952b; }

/* 空状态 */
.empty { text-align: center; padding: 40px 20px; color: #bbb; }
.empty .icon { font-size: 48px; margin-bottom: 12px; }

/* 按钮 */
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 20px; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; font-weight: 600; transition: .2s; }
.btn-primary { background: #4A90D9; color: #fff; }
.btn-primary:active { background: #3a7bc8; }
.btn-outline { background: #fff; color: #4A90D9; border: 1px solid #4A90D9; }
.btn-danger { background: #e74c3c; color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-block { width: 100%; }
.fab { position: fixed; bottom: 24px; right: 24px; width: 52px; height: 52px; border-radius: 50%; background: #4A90D9; color: #fff; font-size: 28px; border: none; box-shadow: 0 4px 12px rgba(74,144,217,.4); cursor: pointer; z-index: 5; transition: .2s; display: flex; align-items: center; justify-content: center; }
.fab:active { transform: scale(.9); }

/* 弹窗 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: #fff; width: 100%; max-width: 600px; border-radius: 16px 16px 0 0; padding: 20px 16px 32px; max-height: 85vh; overflow-y: auto; animation: slideUp .25s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h3 { font-size: 16px; margin-bottom: 16px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
.form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; -webkit-appearance: none; background: #fafafa; }
.form-actions { display: flex; gap: 10px; margin-top: 20px; }
.form-actions button { flex: 1; }

/* 学生列表 */
.student-list { padding: 12px; }
.student-card { background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
.student-card .meta { font-size: 13px; color: #666; margin-top: 2px; }
.student-card .actions { display: flex; gap: 6px; }

/* 分享视图 */
.share-header { background: #4A90D9; color: #fff; padding: 24px 16px; text-align: center; }
.share-header h2 { font-size: 18px; margin-bottom: 4px; }
.share-header p { font-size: 13px; opacity: .8; }
.share-class-card { border-left-color: #999; }

/* Toast */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 200; animation: fadeIn .3s; pointer-events: none; }
@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* 操作按钮组 */
.action-bar { padding: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.action-bar button { flex: 1; min-width: 80px; }

/* 学生选择 */
.student-select { padding: 8px 12px; }
.student-chip { display: inline-block; padding: 8px 14px; margin: 4px; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; cursor: pointer; background: #fff; transition: .15s; }
.student-chip.selected { background: #4A90D9; color: #fff; border-color: #4A90D9; }
</style>
</head>
<body>

<!-- 管理端 -->
<div id="adminView">
  <header>
    <h1>📅 张老师课表</h1>
    <div style="display:flex;gap:6px">
      <button class="btn btn-outline btn-sm" onclick="showExportModal()">备份</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('schedule')">课表</div>
    <div class="tab" onclick="switchTab('students')">学生</div>
  </div>

  <!-- 课表视图 -->
  <div id="scheduleView">
    <div class="week-nav">
      <button onclick="prevWeek()">‹</button>
      <span class="week-label" id="weekLabel"></span>
      <button onclick="nextWeek()">›</button>
      <button class="btn btn-outline btn-sm" onclick="goToday()">今天</button>
    </div>

    <div class="day-tabs" id="dayTabs"></div>

    <div class="class-list" id="classList"></div>

    <div id="shareBar" class="action-bar hidden">
      <button class="btn btn-primary btn-block" onclick="generateShareLink()">📤 生成分享链接（脱敏）</button>
    </div>
  </div>

  <!-- 学生管理视图 -->
  <div id="studentView" class="hidden">
    <div class="action-bar">
      <button class="btn btn-primary btn-block" onclick="showStudentModal()">+ 添加学生</button>
    </div>
    <div class="student-list" id="studentList"></div>
    <div class="empty" id="studentEmpty">
      <div class="icon">📋</div>
      <div>还没有添加学生</div>
    </div>
  </div>

  <button class="fab hidden" id="fabAdd" onclick="showClassModal()">+</button>
</div>

<!-- 分享视图（学管看到的） -->
<div id="shareView" class="hidden">
  <div class="share-header">
    <h2>📅 课程安排</h2>
    <p id="shareWeekLabel"></p>
  </div>
  <div class="class-list" id="shareClassList"></div>
  <div class="empty" id="shareEmpty">
    <div class="icon">📭</div>
    <div>本周暂无课程</div>
  </div>
</div>

<!-- 弹窗：添加/编辑课程 -->
<div class="modal-overlay hidden" id="classModal">
  <div class="modal">
    <h3 id="classModalTitle">添加课程</h3>
    <div class="form-group">
      <label>学生（可多选）</label>
      <div class="student-select" id="studentChips"></div>
    </div>
    <div class="form-group">
      <label>星期</label>
      <select id="classDay"></select>
    </div>
    <div class="form-group" style="display:flex;gap:10px">
      <div style="flex:1"><label>开始时间</label><input type="time" id="classStart"></div>
      <div style="flex:1"><label>结束时间</label><input type="time" id="classEnd"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal('classModal')">取消</button>
      <button class="btn btn-danger btn-sm hidden" id="classDeleteBtn" onclick="deleteClass()">删除</button>
      <button class="btn btn-primary" id="classSaveBtn" onclick="saveClass()">保存</button>
    </div>
  </div>
</div>

<!-- 弹窗：添加/编辑学生 -->
<div class="modal-overlay hidden" id="studentModal">
  <div class="modal">
    <h3 id="studentModalTitle">添加学生</h3>
    <div class="form-group">
      <label>学生代号 *</label>
      <input type="text" id="stuCode" placeholder="如：张同学 / A01 / 小明">
    </div>
    <div class="form-group">
      <label>年级</label>
      <select id="stuGrade">
        <option value="">不填</option>
        <option>初一</option><option>初二</option><option>初三</option>
        <option>高一</option><option>高二</option><option>高三</option>
        <option>小学</option><option>其他</option>
      </select>
    </div>
    <div class="form-group">
      <label>科目</label>
      <select id="stuSubject">
        <option value="">不填</option>
        <option>英语</option><option>数学</option><option>语文</option>
        <option>物理</option><option>化学</option><option>其他</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal('studentModal')">取消</button>
      <button class="btn btn-danger btn-sm hidden" id="stuDeleteBtn" onclick="deleteStudent()">删除</button>
      <button class="btn btn-primary" id="stuSaveBtn" onclick="saveStudent()">保存</button>
    </div>
  </div>
</div>

<!-- 弹窗：备份/恢复 -->
<div class="modal-overlay hidden" id="exportModal">
  <div class="modal">
    <h3>数据备份</h3>
    <div class="form-actions" style="flex-direction:column">
      <button class="btn btn-primary btn-block" onclick="exportData()">📥 导出数据文件</button>
      <button class="btn btn-outline btn-block" onclick="document.getElementById('importFile').click()">📤 导入数据文件</button>
      <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(event)">
      <button class="btn btn-outline btn-block" onclick="closeModal('exportModal')">关闭</button>
    </div>
    <p style="font-size:12px;color:#999;margin-top:12px;text-align:center">导入会覆盖当前全部数据，请先备份</p>
  </div>
</div>

<script>
// ========== 数据层 ==========
const DB = {
  getStudents() { try { return JSON.parse(localStorage.schedule_students || '[]'); } catch(e) { return []; } },
  setStudents(v) { localStorage.schedule_students = JSON.stringify(v); },
  getClasses() { try { return JSON.parse(localStorage.schedule_classes || '[]'); } catch(e) { return []; } },
  setClasses(v) { localStorage.schedule_classes = JSON.stringify(v); },
};

let currentWeekStart = getMonday(new Date());
let selectedDayIdx = 0; // 0=Mon, 6=Sun
let editingClassId = null;
let editingStudentId = null;
let selectedStudentIds = [];

function getMonday(d) { const r = new Date(d); r.setHours(0,0,0,0); const day = r.getDay(); const diff = day === 0 ? -6 : 1 - day; r.setDate(r.getDate() + diff); return r; }
function fmtDate(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function weekDayName(i) { return ['一','二','三','四','五','六','日'][i]; }
function getDayDate(i) { const d = new Date(currentWeekStart); d.setDate(d.getDate() + i); return d; }

// ========== 初始化 ==========
function init() {
  const hash = window.location.hash.slice(1);
  if (hash) {
    showShareView(hash);
  } else {
    showAdminView();
  }
}

function showAdminView() {
  document.getElementById('adminView').classList.remove('hidden');
  document.getElementById('shareView').classList.add('hidden');
  switchTab('schedule');
  renderAll();
}

// ========== 标签切换 ==========
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (tab === 'schedule' && i === 0) || (tab === 'students' && i === 1));
  });
  document.getElementById('scheduleView').classList.toggle('hidden', tab !== 'schedule');
  document.getElementById('studentView').classList.toggle('hidden', tab !== 'students');
  document.getElementById('fabAdd').classList.toggle('hidden', tab !== 'schedule');
  if (tab === 'schedule') renderCalendar();
  if (tab === 'students') renderStudentList();
}

// ========== 周导航 ==========
function prevWeek() { currentWeekStart.setDate(currentWeekStart.getDate() - 7); renderCalendar(); }
function nextWeek() { currentWeekStart.setDate(currentWeekStart.getDate() + 7); renderCalendar(); }
function goToday() { currentWeekStart = getMonday(new Date()); renderCalendar(); }

// ========== 渲染课表 ==========
function renderCalendar() {
  const endDate = new Date(currentWeekStart);
  endDate.setDate(endDate.getDate() + 6);

  document.getElementById('weekLabel').textContent =
    `${currentWeekStart.getFullYear()}年 ${fmtDate(currentWeekStart)} - ${fmtDate(endDate)}`;

  // 天标签
  const today = new Date();
  today.setHours(0,0,0,0);
  let dayTabsHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = getDayDate(i);
    const isToday = d.getTime() === today.getTime();
    const active = i === selectedDayIdx ? ' active' : '';
    dayTabsHTML += `<div class="day-tab${active}" onclick="selectDay(${i})">周${weekDayName(i)}<br><span class="date-num">${fmtDate(d)}${isToday ? ' 今天' : ''}</span></div>`;
  }
  document.getElementById('dayTabs').innerHTML = dayTabsHTML;

  // 当前天的课程
  const allClasses = DB.getClasses().filter(c => {
    const cDate = c.weekStart ? new Date(c.weekStart) : null;
    return cDate && cDate.getTime() === currentWeekStart.getTime() && c.dayIdx === selectedDayIdx;
  });
  allClasses.sort((a,b) => a.startTime.localeCompare(b.startTime));

  const students = DB.getStudents();
  let html = '';
  if (allClasses.length === 0) {
    html = '<div class="empty"><div class="icon">📭</div><div>这天没课，点右下角 + 添加</div></div>';
  } else {
    allClasses.forEach(c => {
      const stus = (c.studentIds || []).map(id => students.find(s => s.id === id)).filter(Boolean);
      const names = stus.map(s => s.codeName).join('、');
      const grades = [...new Set(stus.map(s => s.grade).filter(Boolean))];
      const subjects = [...new Set(stus.map(s => s.subject).filter(Boolean))];
      html += `<div class="class-card" onclick="editClass('${c.id}')">
        <div class="info">
          <div class="time">${c.startTime.slice(0,5)} - ${c.endTime.slice(0,5)}</div>
          <div class="detail">${names || '未指定'}</div>
        </div>
        <div style="text-align:right">
          ${grades.map(g => `<span class="tag tag-grade">${g}</span>`).join('')}
          ${subjects.map(s => `<span class="tag tag-subject">${s}</span>`).join('')}
        </div>
      </div>`;
    });
  }
  document.getElementById('classList').innerHTML = html;

  // 分享按钮
  const hasClasses = DB.getClasses().some(c => {
    const cDate = c.weekStart ? new Date(c.weekStart) : null;
    return cDate && cDate.getTime() === currentWeekStart.getTime();
  });
  document.getElementById('shareBar').classList.toggle('hidden', !hasClasses);
}

function selectDay(i) {
  selectedDayIdx = i;
  renderCalendar();
}

// ========== 课程弹窗 ==========
function showClassModal() {
  editingClassId = null;
  selectedStudentIds = [];
  document.getElementById('classModalTitle').textContent = '添加课程';
  document.getElementById('classDeleteBtn').classList.add('hidden');
  document.getElementById('classDay').value = selectedDayIdx;
  document.getElementById('classStart').value = '18:00';
  document.getElementById('classEnd').value = '19:30';
  renderStudentChips();
  document.getElementById('classModal').classList.remove('hidden');
}

function editClass(id) {
  const c = DB.getClasses().find(x => x.id === id);
  if (!c) return;
  editingClassId = id;
  selectedStudentIds = [...(c.studentIds || [])];
  document.getElementById('classModalTitle').textContent = '编辑课程';
  document.getElementById('classDeleteBtn').classList.remove('hidden');
  document.getElementById('classDay').value = c.dayIdx;
  document.getElementById('classStart').value = c.startTime;
  document.getElementById('classEnd').value = c.endTime;
  renderStudentChips();
  document.getElementById('classModal').classList.remove('hidden');
}

function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
  editingClassId = null;
  editingStudentId = null;
  selectedStudentIds = [];
}

function saveClass() {
  const dayIdx = parseInt(document.getElementById('classDay').value);
  const startTime = document.getElementById('classStart').value;
  const endTime = document.getElementById('classEnd').value;

  if (!startTime || !endTime) { toast('请选择时间'); return; }
  if (startTime >= endTime) { toast('结束时间必须晚于开始时间'); return; }
  if (selectedStudentIds.length === 0) { toast('请至少选择一个学生'); return; }

  const classes = DB.getClasses();
  if (editingClassId) {
    const idx = classes.findIndex(c => c.id === editingClassId);
    if (idx >= 0) {
      classes[idx].dayIdx = dayIdx;
      classes[idx].startTime = startTime;
      classes[idx].endTime = endTime;
      classes[idx].studentIds = [...selectedStudentIds];
      classes[idx].weekStart = currentWeekStart.toISOString().slice(0,10);
    }
  } else {
    classes.push({
      id: 'c_' + Date.now(),
      dayIdx, startTime, endTime,
      studentIds: [...selectedStudentIds],
      weekStart: currentWeekStart.toISOString().slice(0,10),
    });
  }
  DB.setClasses(classes);
  closeModal('classModal');
  renderCalendar();
}

function deleteClass() {
  if (!editingClassId) return;
  if (!confirm('确定删除这个课程？')) return;
  DB.setClasses(DB.getClasses().filter(c => c.id !== editingClassId));
  closeModal('classModal');
  renderCalendar();
}

function renderStudentChips() {
  const students = DB.getStudents();
  if (students.length === 0) {
    document.getElementById('studentChips').innerHTML = '<span style="color:#999;font-size:13px">还没有添加学生，请先去"学生"页添加</span>';
    return;
  }
  document.getElementById('studentChips').innerHTML = students.map(s => {
    const sel = selectedStudentIds.includes(s.id);
    return `<span class="student-chip${sel ? ' selected' : ''}" onclick="toggleStudentChip('${s.id}', this)">${s.codeName}</span>`;
  }).join('');
}

function toggleStudentChip(id, el) {
  if (selectedStudentIds.includes(id)) {
    selectedStudentIds = selectedStudentIds.filter(x => x !== id);
    el.classList.remove('selected');
  } else {
    selectedStudentIds.push(id);
    el.classList.add('selected');
  }
}

// ========== 学生管理 ==========
function renderStudentList() {
  const students = DB.getStudents();
  document.getElementById('studentEmpty').classList.toggle('hidden', students.length > 0);
  document.getElementById('studentList').innerHTML = students.map(s => `
    <div class="student-card" onclick="editStudent('${s.id}')">
      <div>
        <div style="font-weight:600;font-size:15px">${s.codeName}</div>
        <div class="meta">${[s.grade, s.subject].filter(Boolean).join(' · ') || '未设置年级/科目'}</div>
      </div>
      <div class="actions">
        <span class="tag tag-grade">${s.grade || '未设'}</span>
        <span class="tag tag-subject">${s.subject || '未设'}</span>
      </div>
    </div>
  `).join('');
}

function showStudentModal() {
  editingStudentId = null;
  document.getElementById('studentModalTitle').textContent = '添加学生';
  document.getElementById('stuDeleteBtn').classList.add('hidden');
  document.getElementById('stuCode').value = '';
  document.getElementById('stuGrade').value = '';
  document.getElementById('stuSubject').value = '';
  document.getElementById('studentModal').classList.remove('hidden');
}

function editStudent(id) {
  const s = DB.getStudents().find(x => x.id === id);
  if (!s) return;
  editingStudentId = id;
  document.getElementById('studentModalTitle').textContent = '编辑学生';
  document.getElementById('stuDeleteBtn').classList.remove('hidden');
  document.getElementById('stuCode').value = s.codeName;
  document.getElementById('stuGrade').value = s.grade || '';
  document.getElementById('stuSubject').value = s.subject || '';
  document.getElementById('studentModal').classList.remove('hidden');
}

function saveStudent() {
  const codeName = document.getElementById('stuCode').value.trim();
  if (!codeName) { toast('请输入学生代号'); return; }
  const grade = document.getElementById('stuGrade').value;
  const subject = document.getElementById('stuSubject').value;

  const students = DB.getStudents();
  if (editingStudentId) {
    const idx = students.findIndex(s => s.id === editingStudentId);
    if (idx >= 0) { students[idx].codeName = codeName; students[idx].grade = grade; students[idx].subject = subject; }
  } else {
    students.push({ id: 's_' + Date.now(), codeName, grade, subject });
  }
  DB.setStudents(students);
  closeModal('studentModal');
  renderStudentList();
  renderCalendar();
}

function deleteStudent() {
  if (!editingStudentId) return;
  if (!confirm('删除学生不会删除已有的课程记录，确定删除？')) return;
  DB.setStudents(DB.getStudents().filter(s => s.id !== editingStudentId));
  closeModal('studentModal');
  renderStudentList();
}

// ========== 分享 ==========
function generateShareLink() {
  const students = DB.getStudents();
  const weekClasses = DB.getClasses().filter(c => {
    const cDate = c.weekStart ? new Date(c.weekStart) : null;
    return cDate && cDate.getTime() === currentWeekStart.getTime();
  });

  if (weekClasses.length === 0) { toast('本周没有课程可分享'); return; }

  // 构建脱敏数据
  const shareData = weekClasses.map(c => {
    const stus = (c.studentIds || []).map(id => students.find(s => s.id === id)).filter(Boolean);
    return {
      d: c.dayIdx,
      s: c.startTime.slice(0,5),
      e: c.endTime.slice(0,5),
      n: stus.map(s => s.codeName),
      g: [...new Set(stus.map(s => s.grade).filter(Boolean))],
      b: [...new Set(stus.map(s => s.subject).filter(Boolean))],
    };
  });

  const payload = {
    w: currentWeekStart.toISOString().slice(0,10),
    c: shareData
  };

  // 编码
  const encoded = btoa(String.fromCharCode(...new TextEncoder().encode(JSON.stringify(payload))));
  const link = location.origin + location.pathname + '#' + encoded;

  // 复制到剪贴板
  if (navigator.clipboard) {
    navigator.clipboard.writeText(link).then(() => toast('✅ 分享链接已复制！学管看不到学生真实信息'));
  } else {
    // 降级方案
    const ta = document.createElement('textarea');
    ta.value = link; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('✅ 分享链接已复制！');
  }
}

// ========== 分享视图（学管端） ==========
function showShareView(hash) {
  document.getElementById('adminView').classList.add('hidden');
  document.getElementById('shareView').classList.remove('hidden');

  try {
    const json = new TextDecoder().decode(Uint8Array.from(atob(hash).split('').map(c => c.charCodeAt(0))));
    const data = JSON.parse(json);
    const weekStart = new Date(data.w + 'T00:00:00');
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate() + 6);
    document.getElementById('shareWeekLabel').textContent =
      `${weekStart.getFullYear()}年 ${fmtDate(weekStart)} - ${fmtDate(weekEnd)}`;

    // 按天分组
    const byDay = {};
    data.c.forEach(c => {
      if (!byDay[c.d]) byDay[c.d] = [];
      byDay[c.d].push(c);
    });

    let html = '';
    for (let i = 0; i < 7; i++) {
      const dayClasses = (byDay[i] || []).sort((a,b) => a.s.localeCompare(b.s));
      if (dayClasses.length === 0) continue;
      html += `<div class="day-section"><div class="day-title">周${weekDayName(i)} · ${fmtDate(new Date(weekStart.getTime() + i*86400000))}</div>`;
      dayClasses.forEach(c => {
        html += `<div class="class-card share-class-card">
          <div class="info">
            <div class="time">${c.s} - ${c.e}</div>
            <div class="detail">${c.n.join('、')}</div>
          </div>
          <div style="text-align:right">
            ${c.g.map(g => `<span class="tag tag-grade">${g}</span>`).join('')}
            ${c.b.map(b => `<span class="tag tag-subject">${b}</span>`).join('')}
          </div>
        </div>`;
      });
      html += '</div>';
    }

    document.getElementById('shareClassList').innerHTML = html;
    document.getElementById('shareEmpty').classList.toggle('hidden', html !== '');
  } catch(e) {
    document.getElementById('shareClassList').innerHTML = '<div class="empty"><div class="icon">⚠️</div><div>链接已失效，请联系重新分享</div></div>';
    document.getElementById('shareEmpty').classList.add('hidden');
  }
}

// ========== 备份 ==========
function showExportModal() { document.getElementById('exportModal').classList.remove('hidden'); }

function exportData() {
  const blob = new Blob([JSON.stringify({ students: DB.getStudents(), classes: DB.getClasses() }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'schedule_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  toast('✅ 备份文件已下载');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.students) DB.setStudents(data.students);
      if (data.classes) DB.setClasses(data.classes);
      toast('✅ 数据导入成功');
      renderAll();
      closeModal('exportModal');
    } catch(ex) { toast('❌ 文件格式错误'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ========== 工具 ==========
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.remove(); }, 2000);
}

function renderAll() {
  renderCalendar();
  renderStudentList();
}

// ========== 关闭弹窗（点击背景） ==========
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.add('hidden');
    editingClassId = null;
    editingStudentId = null;
    selectedStudentIds = [];
  }
});

// ========== 启动 ==========
init();
</script>
