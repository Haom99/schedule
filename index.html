<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>张老师课表</title>
<style>
:root {
  --bg: #F2F3F7;
  --card: #FFFFFF;
  --primary: #388E3C;
  --primary-dark: #2E7D32;
  --text: #1A1D2E;
  --text2: #6B7094;
  --text3: #A0A4C0;
  --shadow: 0 2px 12px rgba(56,142,60,.08);
  --shadow-lg: 0 8px 32px rgba(56,142,60,.12);
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); max-width: 560px; margin: 0 auto; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
.hidden { display: none !important; }

/* 顶部 */
header { background: rgba(255,255,255,.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid rgba(0,0,0,.04); }
header h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }

/* 标签 */
.tabs { display: flex; margin: 12px 12px 0; background: rgba(0,0,0,.04); border-radius: 12px; padding: 3px; gap: 3px; }
.tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; cursor: pointer; border-radius: 10px; font-weight: 500; color: var(--text2); transition: .25s; }
.tab.active { background: #fff; color: var(--primary); font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,.06); }

/* 周导航 */
.week-nav { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 12px 6px; }
.week-nav button { width: 36px; height: 36px; border: none; background: var(--card); border-radius: 50%; font-size: 18px; cursor: pointer; color: var(--text); box-shadow: var(--shadow); transition: .2s; display: flex; align-items: center; justify-content: center; }
.week-nav button:active { background: #f0f0f5; transform: scale(.94); }
.week-nav .week-label { font-size: 15px; font-weight: 700; min-width: 200px; text-align: center; letter-spacing: -.2px; }

/* 天选择器 - 横向滑动卡片 */
.day-strip { display: flex; gap: 8px; padding: 10px 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.day-strip::-webkit-scrollbar { display: none; }
.day-chip { flex-shrink: 0; width: 62px; padding: 10px 0; border-radius: 14px; text-align: center; cursor: pointer; background: var(--card); box-shadow: var(--shadow); transition: .25s; position: relative; }
.day-chip.active { background: var(--primary); color: #fff; box-shadow: 0 4px 16px rgba(56,142,60,.35); transform: translateY(-2px); }
.day-chip .chip-day { font-size: 12px; margin-bottom: 2px; opacity: .7; }
.day-chip.active .chip-day { opacity: .9; }
.day-chip .chip-date { font-size: 18px; font-weight: 700; }
.day-chip .chip-dot { display: none; width: 6px; height: 6px; border-radius: 50%; background: var(--primary); margin: 6px auto 0; }
.day-chip.active .chip-dot { background: #fff; }
.day-chip.has-class .chip-dot { display: block; }
.day-chip .chip-today { font-size: 10px; color: var(--primary); font-weight: 600; margin-top: 1px; }
.day-chip.active .chip-today { color: rgba(255,255,255,.8); }

/* 课程卡片 */
.class-list { padding: 8px 12px 80px; }
.class-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; display: flex; gap: 14px; align-items: center; box-shadow: var(--shadow); cursor: pointer; transition: .2s; border-left: 4px solid var(--primary); position: relative; overflow: hidden; }
.class-card:active { transform: scale(.98); box-shadow: var(--shadow-lg); }
.class-card .card-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
.class-card .card-time { font-size: 17px; font-weight: 700; white-space: nowrap; min-width: 100px; letter-spacing: -.2px; }
.class-card .card-info { flex: 1; min-width: 0; }
.class-card .card-names { font-size: 15px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.class-card .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
.tag-grade { background: #EEF0FF; color: var(--primary); }

/* 空状态 */
.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty .icon { font-size: 64px; margin-bottom: 16px; opacity: .6; }
.empty p { font-size: 15px; margin-bottom: 6px; }

/* 按钮 */
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 24px; border-radius: 12px; font-size: 14px; border: none; cursor: pointer; font-weight: 600; transition: .2s; letter-spacing: -.1px; }
.btn-primary { background: var(--primary); color: #fff; box-shadow: 0 4px 14px rgba(56,142,60,.3); }
.btn-primary:active { background: var(--primary-dark); transform: scale(.97); }
.btn-outline { background: var(--card); color: var(--primary); border: 1.5px solid #E0E2F0; }
.btn-danger { background: #FF4757; color: #fff; }
.btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 8px; }
.btn-block { width: 100%; }
.fab { position: fixed; bottom: 28px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #388E3C, #66BB6A); color: #fff; font-size: 28px; border: none; box-shadow: 0 6px 20px rgba(56,142,60,.4); cursor: pointer; z-index: 5; transition: .25s; display: flex; align-items: center; justify-content: center; }
.fab:active { transform: scale(.9); box-shadow: 0 3px 10px rgba(56,142,60,.3); }

/* 弹窗 - 毛玻璃效果 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: rgba(255,255,255,.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); width: 100%; max-width: 560px; border-radius: 24px 24px 0 0; padding: 24px 20px 36px; max-height: 85vh; overflow-y: auto; animation: slideUp .3s cubic-bezier(.16,1,.3,1); box-shadow: 0 -8px 40px rgba(0,0,0,.08); }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; letter-spacing: -.3px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 1.5px solid #E8E9F0; border-radius: 12px; font-size: 15px; background: #F8F9FC; color: var(--text); transition: .2s; -webkit-appearance: none; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(56,142,60,.1); }
.form-actions { display: flex; gap: 10px; margin-top: 24px; }
.form-actions button { flex: 1; }

/* 学生列表 */
.student-list { padding: 12px; }
.student-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); cursor: pointer; transition: .2s; }
.student-card:active { transform: scale(.98); }
.student-card .meta { font-size: 13px; color: var(--text2); margin-top: 3px; }

/* 分享视图 */
.share-header { background: linear-gradient(135deg, #388E3C, #66BB6A); color: #fff; padding: 36px 20px; text-align: center; border-radius: 0 0 24px 24px; }
.share-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.share-header p { font-size: 13px; opacity: .8; }
.share-class-card { border-left-width: 4px; }

/* Toast */
.toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: rgba(26,29,46,.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: #fff; padding: 12px 22px; border-radius: 24px; font-size: 13px; z-index: 200; animation: fadeIn .3s; pointer-events: none; font-weight: 500; }
@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

.action-bar { padding: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.action-bar button { flex: 1; min-width: 80px; }

/* 学生选择芯片 */
.student-select { padding: 4px 0; }
.student-chip { display: inline-block; padding: 9px 16px; margin: 3px; border: 1.5px solid #E8E9F0; border-radius: 22px; font-size: 13px; cursor: pointer; background: #F8F9FC; transition: .2s; font-weight: 500; }
.student-chip.selected { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 12px rgba(56,142,60,.25); }

/* 周概览指示器 */
.day-strip-header { font-size: 12px; color: var(--text3); padding: 0 14px 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
</style>
</head>
<body>

<!-- 管理端 -->
<div id="adminView">
  <header>
    <h1>📅 张老师课表</h1>
    <div style="display:flex;gap:6px">
      <button class="btn btn-outline btn-sm" onclick="showExportModal()">备份</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('schedule')">课表</div>
    <div class="tab" onclick="switchTab('students')">学生</div>
  </div>

  <!-- 课表视图 -->
  <div id="scheduleView">
    <div class="week-nav">
      <button onclick="prevWeek()">‹</button>
      <span class="week-label" id="weekLabel"></span>
      <button onclick="nextWeek()">›</button>
      <button class="btn btn-outline btn-sm" onclick="goToday()">今天</button>
    </div>

    <div class="day-tabs" id="dayTabs"></div>

    <div class="class-list" id="classList"></div>

    <div id="shareBar" class="action-bar hidden">
      <button class="btn btn-primary btn-block" onclick="generateShareLink()">📤 生成分享链接（脱敏）</button>
    </div>
  </div>

  <!-- 学生管理视图 -->
  <div id="studentView" class="hidden">
    <div class="action-bar">
      <button class="btn btn-primary btn-block" onclick="showStudentModal()">+ 添加学生</button>
    </div>
    <div class="student-list" id="studentList"></div>
    <div class="empty" id="studentEmpty">
      <div class="icon">📋</div>
      <div>还没有添加学生</div>
    </div>
  </div>

  <button class="fab hidden" id="fabAdd" onclick="showClassModal()">+</button>
</div>

<!-- 分享视图（学管看到的） -->
<div id="shareView" class="hidden">
  <div class="share-header">
    <h2>📅 课程安排</h2>
    <p id="shareWeekLabel"></p>
  </div>
  <div class="class-list" id="shareClassList"></div>
  <div class="empty" id="shareEmpty">
    <div class="icon">📭</div>
    <div>本周暂无课程</div>
  </div>
</div>

<!-- 弹窗：添加/编辑课程 -->
<div class="modal-overlay hidden" id="classModal">
  <div class="modal">
    <h3 id="classModalTitle">添加课程</h3>
    <div class="form-group">
      <label>学生（可多选）</label>
      <div class="student-select" id="studentChips"></div>
    </div>
    <div class="form-group">
      <label>上课日期（可多选）</label>
      <div class="student-select" id="dayChips"></div>
    </div>
    <div class="form-group" style="display:flex;gap:10px">
      <div style="flex:1"><label>开始时间</label><input type="time" id="classStart"></div>
      <div style="flex:1"><label>结束时间</label><input type="time" id="classEnd"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal('classModal')">取消</button>
      <button class="btn btn-danger btn-sm hidden" id="classDeleteBtn" onclick="deleteClass()">删除</button>
      <button class="btn btn-primary" id="classSaveBtn" onclick="saveClass()">保存</button>
    </div>
  </div>
</div>

<!-- 弹窗：添加/编辑学生 -->
<div class="modal-overlay hidden" id="studentModal">
  <div class="modal">
    <h3 id="studentModalTitle">添加学生</h3>
    <div class="form-group">
      <label>学生代号 *</label>
      <input type="text" id="stuCode" placeholder="如：张同学 / A01 / 小明">
    </div>
    <div class="form-group">
      <label>年级</label>
      <select id="stuGrade">
        <option value="">不填</option>
        <option>初一</option><option>初二</option><option>初三</option>
        <option>高一</option><option>高二</option><option>高三</option>
        <option>小学</option><option>其他</option>
      </select>
    </div>
    <div class="form-group">
      <label>科目</label>
      <select id="stuSubject">
        <option value="">不填</option>
        <option>英语</option><option>数学</option><option>语文</option>
        <option>物理</option><option>化学</option><option>其他</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal('studentModal')">取消</button>
      <button class="btn btn-danger btn-sm hidden" id="stuDeleteBtn" onclick="deleteStudent()">删除</button>
      <button class="btn btn-primary" id="stuSaveBtn" onclick="saveStudent()">保存</button>
    </div>
  </div>
</div>

<!-- 弹窗：备份/恢复 -->
<div class="modal-overlay hidden" id="exportModal">
  <div class="modal">
    <h3>数据备份</h3>
    <div class="form-actions" style="flex-direction:column">
      <button class="btn btn-primary btn-block" onclick="exportData()">📥 导出数据文件</button>
      <button class="btn btn-outline btn-block" onclick="document.getElementById('importFile').click()">📤 导入数据文件</button>
      <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(event)">
      <button class="btn btn-outline btn-block" onclick="closeModal('exportModal')">关闭</button>
    </div>
    <p style="font-size:12px;color:#999;margin-top:12px;text-align:center">导入会覆盖当前全部数据，请先备份</p>
  </div>
</div>

<script>
// ========== 数据层 ==========
const DB = {
  getStudents() { try { return JSON.parse(localStorage.schedule_students || '[]'); } catch(e) { return []; } },
  setStudents(v) { try { localStorage.schedule_students = JSON.stringify(v); } catch(e) { console.error(e); alert('保存失败：浏览器存储不可用'); } },
  getClasses() { try { return JSON.parse(localStorage.schedule_classes || '[]'); } catch(e) { return []; } },
  setClasses(v) { try { localStorage.schedule_classes = JSON.stringify(v); } catch(e) { console.error(e); alert('保存失败：浏览器存储不可用'); } },
  ok() { try { localStorage._test=1; delete localStorage._test; return true; } catch(e) { return false; } }
};

let currentWeekStart = getMonday(new Date());
let selectedDayIdx = 0; // 0=Mon, 6=Sun
let editingClassId = null;
let editingStudentId = null;
let selectedStudentIds = [];
let selectedDayIdxs = [];

function getMonday(d) { const r = new Date(d); r.setHours(0,0,0,0); const day = r.getDay(); const diff = day === 0 ? -6 : 1 - day; r.setDate(r.getDate() + diff); return r; }
function fmtDate(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function fmtLocalDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function weekDayName(i) { return ['一','二','三','四','五','六','日'][i]; }
function getDayDate(i) { const d = new Date(currentWeekStart); d.setDate(d.getDate() + i); return d; }

// ========== 初始化 ==========
function init() {
  const hash = window.location.hash.slice(1);
  if (hash) {
    showShareView(hash);
  } else {
    showAdminView();
  }
}

function showAdminView() {
  document.getElementById('adminView').classList.remove('hidden');
  document.getElementById('shareView').classList.add('hidden');
  switchTab('schedule');
  renderAll();
}

// ========== 标签切换 ==========
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (tab === 'schedule' && i === 0) || (tab === 'students' && i === 1));
  });
  document.getElementById('scheduleView').classList.toggle('hidden', tab !== 'schedule');
  document.getElementById('studentView').classList.toggle('hidden', tab !== 'students');
  document.getElementById('fabAdd').classList.toggle('hidden', tab !== 'schedule');
  if (tab === 'schedule') renderCalendar();
  if (tab === 'students') renderStudentList();
}

// ========== 周导航 ==========
function prevWeek() { currentWeekStart.setDate(currentWeekStart.getDate() - 7); renderCalendar(); }
function nextWeek() { currentWeekStart.setDate(currentWeekStart.getDate() + 7); renderCalendar(); }
function goToday() { currentWeekStart = getMonday(new Date()); renderCalendar(); }

// ========== 渲染课表 ==========
function renderCalendar() {
  const endDate = new Date(currentWeekStart);
  endDate.setDate(endDate.getDate() + 6);

  document.getElementById('weekLabel').textContent =
    `${currentWeekStart.getFullYear()}年 ${fmtDate(currentWeekStart)} - ${fmtDate(endDate)}`;

  // 天标签 - 卡片式
  const today = new Date();
  today.setHours(0,0,0,0);
  const weekStr = fmtLocalDate(currentWeekStart);
  const allWeekClasses = DB.getClasses().filter(c => c.weekStart === weekStr);
  const daysWithClass = new Set();
  allWeekClasses.forEach(c => {
    const days = c.dayIdxs || (c.dayIdx !== undefined ? [c.dayIdx] : []);
    days.forEach(d => daysWithClass.add(d));
  });

  let dayTabsHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = getDayDate(i);
    const isToday = d.getTime() === today.getTime();
    const active = i === selectedDayIdx ? ' active' : '';
    const hasClass = daysWithClass.has(i) ? ' has-class' : '';
    dayTabsHTML += `<div class="day-chip${active}${hasClass}" onclick="selectDay(${i})">
      <div class="chip-day">周${weekDayName(i)}</div>
      <div class="chip-date">${d.getDate()}</div>
      ${isToday ? '<div class="chip-today">今天</div>' : ''}
      <div class="chip-dot"></div>
    </div>`;
  }
  document.getElementById('dayTabs').innerHTML = dayTabsHTML;

  // 当前天的课程（兼容dayIdx旧格式和dayIdxs新格式）
  const allClasses = DB.getClasses().filter(c => {
    if (c.weekStart !== weekStr) return false;
    const days = c.dayIdxs || (c.dayIdx !== undefined ? [c.dayIdx] : []);
    return days.includes(selectedDayIdx);
  });
  allClasses.sort((a,b) => a.startTime.localeCompare(b.startTime));

  const students = DB.getStudents();
  let html = '';
  if (allClasses.length === 0) {
    const total = DB.getClasses().length;
    const weekClasses = DB.getClasses().filter(c => c.weekStart === weekStr);
    html = '<div class="empty"><div class="icon">📭</div><div>这天没课</div>';
    html += '<div style="font-size:12px;color:#999;margin-top:8px">总课程：'+total+'条 | 本周('+weekStr+')共：'+weekClasses.length+'条 | 当前天('+selectedDayIdx+'/'+weekDayName(selectedDayIdx)+')</div>';
    if (weekClasses.length > 0) {
      html += '<div style="font-size:12px;color:#f90;margin-top:4px">⚠ 本周有课但不在当天，请切换天标签</div>';
    }
    if (total > 0 && weekClasses.length === 0) {
      html += '<div style="font-size:12px;color:#f90;margin-top:4px">⚠ 有课程但不在本周，请切换周</div>';
    }
    html += '</div>';
  } else {
    allClasses.forEach(c => {
      const stus = (c.studentIds || []).map(id => students.find(s => s.id === id)).filter(Boolean);
      const names = stus.map(s => s.codeName).join('、');
      const grades = [...new Set(stus.map(s => s.grade).filter(Boolean))];
      html += `<div class="class-card" onclick="editClass('${c.id}')">
        <div class="card-time">${c.startTime.slice(0,5)}<br>${c.endTime.slice(0,5)}</div>
        <div class="card-info">
          <div class="card-names">${names || '未指定'}</div>
          <div class="card-tags">
            ${grades.map(g => `<span class="tag tag-grade">${g}</span>`).join('')}
          </div>
        </div>
      </div>`;
    });
  }
  document.getElementById('classList').innerHTML = html;

  // 分享按钮
  const hasClasses = DB.getClasses().some(c => {
    return c.weekStart === fmtLocalDate(currentWeekStart);
  });
  document.getElementById('shareBar').classList.toggle('hidden', !hasClasses);
}

function selectDay(i) {
  selectedDayIdx = i;
  renderCalendar();
}

// ========== 课程弹窗 ==========
function renderDayChips() {
  const container = document.getElementById('dayChips');
  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = getDayDate(i);
    const sel = selectedDayIdxs.includes(i);
    html += `<span class="student-chip${sel ? ' selected' : ''}" onclick="toggleDayChip(${i}, this)">周${weekDayName(i)} · ${fmtDate(d)}</span>`;
  }
  container.innerHTML = html;
}

function toggleDayChip(i, el) {
  if (selectedDayIdxs.includes(i)) {
    selectedDayIdxs = selectedDayIdxs.filter(x => x !== i);
    el.classList.remove('selected');
  } else {
    selectedDayIdxs.push(i);
    el.classList.add('selected');
  }
}

function showClassModal() {
  editingClassId = null;
  selectedStudentIds = [];
  selectedDayIdxs = [selectedDayIdx];
  document.getElementById('classModalTitle').textContent = '添加课程';
  document.getElementById('classDeleteBtn').classList.add('hidden');
  renderDayChips();
  document.getElementById('classStart').value = '18:00';
  document.getElementById('classEnd').value = '19:30';
  renderStudentChips();
  document.getElementById('classModal').classList.remove('hidden');
}

function editClass(id) {
  const c = DB.getClasses().find(x => x.id === id);
  if (!c) return;
  editingClassId = id;
  selectedStudentIds = [...(c.studentIds || [])];
  selectedDayIdxs = c.dayIdxs ? [...c.dayIdxs] : (c.dayIdx !== undefined ? [c.dayIdx] : [selectedDayIdx]);
  document.getElementById('classModalTitle').textContent = '编辑课程';
  document.getElementById('classDeleteBtn').classList.remove('hidden');
  renderDayChips();
  document.getElementById('classStart').value = c.startTime;
  document.getElementById('classEnd').value = c.endTime;
  renderStudentChips();
  document.getElementById('classModal').classList.remove('hidden');
}

function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
  editingClassId = null;
  editingStudentId = null;
  selectedStudentIds = [];
  selectedDayIdxs = [];
}

function saveClass() {
  const startTime = document.getElementById('classStart').value;
  const endTime = document.getElementById('classEnd').value;

  if (!startTime || !endTime) { toast('请选择时间'); return; }
  if (startTime >= endTime) { toast('结束时间必须晚于开始时间'); return; }
  if (selectedStudentIds.length === 0) { toast('请至少选择一个学生'); return; }
  if (selectedDayIdxs.length === 0) { toast('请至少选择一个日期'); return; }

  const classes = DB.getClasses();
  if (editingClassId) {
    const idx = classes.findIndex(c => c.id === editingClassId);
    if (idx >= 0) {
      classes[idx].dayIdxs = [...selectedDayIdxs].sort();
      classes[idx].startTime = startTime;
      classes[idx].endTime = endTime;
      classes[idx].studentIds = [...selectedStudentIds];
      classes[idx].weekStart = fmtLocalDate(currentWeekStart);
    }
  } else {
    classes.push({
      id: 'c_' + Date.now(),
      dayIdxs: [...selectedDayIdxs].sort(),
      startTime, endTime,
      studentIds: [...selectedStudentIds],
      weekStart: fmtLocalDate(currentWeekStart),
    });
  }
  DB.setClasses(classes);
  closeModal('classModal');
  renderCalendar();
  toast('✅ 已保存！本周共' + DB.getClasses().filter(c => c.weekStart === fmtLocalDate(currentWeekStart)).length + '节课');
}

function deleteClass() {
  if (!editingClassId) return;
  if (!confirm('确定删除这个课程？')) return;
  DB.setClasses(DB.getClasses().filter(c => c.id !== editingClassId));
  closeModal('classModal');
  renderCalendar();
}

function renderStudentChips() {
  const students = DB.getStudents();
  if (students.length === 0) {
    document.getElementById('studentChips').innerHTML = '<span style="color:#999;font-size:13px">还没有添加学生，请先去"学生"页添加</span>';
    return;
  }
  document.getElementById('studentChips').innerHTML = students.map(s => {
    const sel = selectedStudentIds.includes(s.id);
    return `<span class="student-chip${sel ? ' selected' : ''}" onclick="toggleStudentChip('${s.id}', this)">${s.codeName}</span>`;
  }).join('');
}

function toggleStudentChip(id, el) {
  if (selectedStudentIds.includes(id)) {
    selectedStudentIds = selectedStudentIds.filter(x => x !== id);
    el.classList.remove('selected');
  } else {
    selectedStudentIds.push(id);
    el.classList.add('selected');
  }
}

// ========== 学生管理 ==========
function renderStudentList() {
  const students = DB.getStudents();
  document.getElementById('studentEmpty').classList.toggle('hidden', students.length > 0);
  document.getElementById('studentList').innerHTML = students.map(s => `
    <div class="student-card" onclick="editStudent('${s.id}')">
      <div>
        <div style="font-weight:600;font-size:15px">${s.codeName}</div>
        <div class="meta">${[s.grade, s.subject].filter(Boolean).join(' · ') || '未设置年级/科目'}</div>
      </div>
      <div class="actions">
        <span class="tag tag-grade">${s.grade || '未设'}</span>
        <span class="tag tag-subject">${s.subject || '未设'}</span>
      </div>
    </div>
  `).join('');
}

function showStudentModal() {
  editingStudentId = null;
  document.getElementById('studentModalTitle').textContent = '添加学生';
  document.getElementById('stuDeleteBtn').classList.add('hidden');
  document.getElementById('stuCode').value = '';
  document.getElementById('stuGrade').value = '';
  document.getElementById('stuSubject').value = '';
  document.getElementById('studentModal').classList.remove('hidden');
}

function editStudent(id) {
  const s = DB.getStudents().find(x => x.id === id);
  if (!s) return;
  editingStudentId = id;
  document.getElementById('studentModalTitle').textContent = '编辑学生';
  document.getElementById('stuDeleteBtn').classList.remove('hidden');
  document.getElementById('stuCode').value = s.codeName;
  document.getElementById('stuGrade').value = s.grade || '';
  document.getElementById('stuSubject').value = s.subject || '';
  document.getElementById('studentModal').classList.remove('hidden');
}

function saveStudent() {
  const codeName = document.getElementById('stuCode').value.trim();
  if (!codeName) { toast('请输入学生代号'); return; }
  const grade = document.getElementById('stuGrade').value;
  const subject = document.getElementById('stuSubject').value;

  const students = DB.getStudents();
  if (editingStudentId) {
    const idx = students.findIndex(s => s.id === editingStudentId);
    if (idx >= 0) { students[idx].codeName = codeName; students[idx].grade = grade; students[idx].subject = subject; }
  } else {
    students.push({ id: 's_' + Date.now(), codeName, grade, subject });
  }
  DB.setStudents(students);
  closeModal('studentModal');
  renderStudentList();
  renderCalendar();
}

function deleteStudent() {
  if (!editingStudentId) return;
  if (!confirm('删除学生不会删除已有的课程记录，确定删除？')) return;
  DB.setStudents(DB.getStudents().filter(s => s.id !== editingStudentId));
  closeModal('studentModal');
  renderStudentList();
}

// ========== 分享 ==========
function generateShareLink() {
  const students = DB.getStudents();
  const weekClasses = DB.getClasses().filter(c => {
    return c.weekStart === fmtLocalDate(currentWeekStart);
  });

  if (weekClasses.length === 0) { toast('本周没有课程可分享'); return; }

  // 构建脱敏数据，数组格式省空间：[[dayIdxs], start, end, [names], [grades], [subjects]]
  const shareData = weekClasses.map(c => {
    const stus = (c.studentIds || []).map(id => students.find(s => s.id === id)).filter(Boolean);
    const days = c.dayIdxs || (c.dayIdx !== undefined ? [c.dayIdx] : []);
    return [
      days,
      c.startTime.slice(0,5),
      c.endTime.slice(0,5),
      stus.map(s => s.codeName),
      [...new Set(stus.map(s => s.grade).filter(Boolean))],
      [...new Set(stus.map(s => s.subject).filter(Boolean))],
    ];
  });

  const payload = {
    w: fmtLocalDate(currentWeekStart),
    c: shareData
  };

  // 编码
  const encoded = btoa(String.fromCharCode(...new TextEncoder().encode(JSON.stringify(payload))));
  const link = location.origin + location.pathname + '#' + encoded;

  // 复制到剪贴板
  if (navigator.clipboard) {
    navigator.clipboard.writeText(link).then(() => toast('✅ 分享链接已复制！学管看不到学生真实信息'));
  } else {
    // 降级方案
    const ta = document.createElement('textarea');
    ta.value = link; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('✅ 分享链接已复制！');
  }
}

// ========== 分享视图（学管端） ==========
function showShareView(hash) {
  document.getElementById('adminView').classList.add('hidden');
  document.getElementById('shareView').classList.remove('hidden');

  try {
    const json = new TextDecoder().decode(Uint8Array.from(atob(hash).split('').map(c => c.charCodeAt(0))));
    const data = JSON.parse(json);
    const weekStart = new Date(data.w + 'T00:00:00');
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate() + 6);
    document.getElementById('shareWeekLabel').textContent =
      `${weekStart.getFullYear()}年 ${fmtDate(weekStart)} - ${fmtDate(weekEnd)}`;

    // 兼容新旧格式：新格式数组 [days[], s, e, n, g, b]，旧格式对象 {d, s, e, n, g, b}
    function norm(c) {
      if (Array.isArray(c)) return { d:c[0], s:c[1], e:c[2], n:c[3], g:c[4]||[], b:c[5]||[] };
      return { d: c.d, s: c.s, e: c.e, n: c.n, g: c.g||[], b: c.b||[] };
    }

    // 按天分组（支持单日和多日）
    const byDay = {};
    data.c.forEach(c => {
      const x = norm(c);
      const days = Array.isArray(x.d) ? x.d : [x.d];
      days.forEach(day => {
        if (!byDay[day]) byDay[day] = [];
        byDay[day].push(x);
      });
    });

    let html = '';
    for (let i = 0; i < 7; i++) {
      const dayClasses = (byDay[i] || []).sort((a,b) => a.s.localeCompare(b.s));
      if (dayClasses.length === 0) continue;
      html += `<div class="day-section"><div class="day-title">周${weekDayName(i)} · ${fmtDate(new Date(weekStart.getTime() + i*86400000))}</div>`;
      dayClasses.forEach(c => {
        html += `<div class="class-card share-class-card">
          <div class="info">
            <div class="time">${c.s} - ${c.e}</div>
            <div class="detail">${c.n.join('、')}</div>
          </div>
          <div style="text-align:right">
            ${c.g.map(g => `<span class="tag tag-grade">${g}</span>`).join('')}
            ${c.b.map(b => `<span class="tag tag-subject">${b}</span>`).join('')}
          </div>
        </div>`;
      });
      html += '</div>';
    }

    document.getElementById('shareClassList').innerHTML = html;
    document.getElementById('shareEmpty').classList.toggle('hidden', html !== '');
  } catch(e) {
    document.getElementById('shareClassList').innerHTML = '<div class="empty"><div class="icon">⚠️</div><div>链接已失效，请联系重新分享</div></div>';
    document.getElementById('shareEmpty').classList.add('hidden');
  }
}

// ========== 备份 ==========
function showExportModal() { document.getElementById('exportModal').classList.remove('hidden'); }

function exportData() {
  const blob = new Blob([JSON.stringify({ students: DB.getStudents(), classes: DB.getClasses() }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'schedule_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  toast('✅ 备份文件已下载');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.students) DB.setStudents(data.students);
      if (data.classes) DB.setClasses(data.classes);
      toast('✅ 数据导入成功');
      renderAll();
      closeModal('exportModal');
    } catch(ex) { toast('❌ 文件格式错误'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ========== 工具 ==========
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.remove(); }, 2000);
}

function renderAll() {
  renderCalendar();
  renderStudentList();
}

// ========== 关闭弹窗（点击背景） ==========
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.add('hidden');
    editingClassId = null;
    editingStudentId = null;
    selectedStudentIds = [];
    selectedDayIdxs = [];
  }
});

// ========== 启动 ==========
init();
</script>
